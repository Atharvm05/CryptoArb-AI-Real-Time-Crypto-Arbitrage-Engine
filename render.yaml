services:
  - type: web
    name: crypto-arb-backend
    env: node
    plan: free
    rootDir: ./
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
    healthCheckPath: /health
